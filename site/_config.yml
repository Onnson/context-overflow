title: ContextOverflow
tagline: Context engineering for humans
description: >-
  Techniques for working with AI that extend your thinking instead of
  replacing it — learn each technique, then hear your agent use it.
url: "https://contextoverflow.org"
theme: just-the-docs
permalink: pretty
markdown: kramdown

search_enabled: true
heading_anchors: true

include: [".well-known"]

plugins:
  - jekyll-sitemap

# Site-wide share-card image. jekyll-seo-tag reads page.image (via these
# defaults), emits an absolute og:image, and upgrades twitter:card to
# summary_large_image. Per-page front-matter `image:` overrides this.
defaults:
  - scope:
      path: ""
    values:
      image:
        path: /assets/og-thesis.png
        width: 1200
        height: 630
        alt: "ContextOverflow — like StackOverflow, but for getting smarter with your AI, not dumber because of it. 31 techniques you read; your AI runs them."

footer_content: >-
  Corpus licensed CC BY-NC-ND 4.0 · Site code licensed Elastic License 2.0

exclude:
  - build.mjs
  - lib/
  - package.json
  - package-lock.json
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - DEPLOY.md
